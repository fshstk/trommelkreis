name: Deploy Caprover Build

on:
  push:
    branches: [ caprover ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v1 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: |
            fshstk/trommelkreis:${{ github.sha }}
            fshstk/trommelkreis:preview
          cache-from: type=registry,ref=fshstk/trommelkreis:preview
          cache-to: type=inline

      - name: Deploy website to trommelkreis.fshstk.ml
        uses: floms/action-caprover@v1
        with:
          host: https://captain.fshstk.ml
          password: ${{ secrets.CAPROVER_PASSWORD }}
          app: trommelkreis
          image: fshstk/trommelkreis:${{ github.sha }}
