[tool.poetry]
authors = ["Fabian Hummel <fshstk@fshstk.com>"]
description = "Django-based website for 'Digitaler Trommelkreis' – a social music production project"
license = "GPL v3.0"
name = "trommelkreis"
version = "2.2.1"

[tool.poetry.dependencies]
Django = "4.2"
Markdown = "3.4.3"
dj-database-url = "1.3.0"
django-compressor = "4.3.1"
django-gulp = "4.1.0"
django-libsass = "0.9"
django-pagedown = "2.2.1"
django-solo = "2.0.0"
graphene = "3.2.2"
graphene-django = "3.0.0"
gunicorn = "20.1.0"
mutagen = "1.46.0"
mysqlclient = "2.1.1"
python = "^3.10"
whitenoise = "6.4.0"

[tool.poetry.dev-dependencies]

[build-system]
build-backend = "poetry.core.masonry.api"
requires = ["poetry-core>=1.0.0"]
